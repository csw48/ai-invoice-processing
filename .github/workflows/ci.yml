name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Install Tesseract OCR
        # Required by the PyMuPDF OCR path (get_textpage_ocr) exercised in test_pdf.py
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: |
          export TESSDATA_PREFIX="$(dirname "$(find /usr/share -name eng.traineddata | head -n1)")"
          uv run pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test -- --run
      - name: Build
        # Smoke-test build only; disable auth so it doesn't require Clerk secrets.
        # Real deployments set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and enable auth.
        env:
          NEXT_PUBLIC_ENABLE_AUTH: 'false'
        run: npm run build
